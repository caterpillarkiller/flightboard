<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-flap: #1a1a1a;
            --bg-flap-light: #222222;
            --accent-amber: #e8a910;
            --accent-amber-dim: #b8860b;
            --text-white: #d4d0c8;
            --text-bright: #f0ece4;
            --text-muted: #888880;
            --split-line: #111111;
            --row-border: #2a2a2a;
            --status-green: #3da63d;
            --status-red: #c43c3c;
            --status-orange: #d4851a;
            --status-blue: #4a8ab5;
            --status-yellow: #c4a825;
        }

        body {
            font-family: 'Roboto Mono', monospace;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 12px 20px;
        }

        /* ── COMPACT HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            margin-bottom: 12px;
            background: var(--bg-flap);
            border-radius: 4px;
            border-bottom: 2px solid var(--accent-amber-dim);
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-amber);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .digital-clock {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 2px;
        }

        .timezone-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .location-info {
            font-size: 0.7rem;
            color: var(--accent-amber-dim);
        }

        .suggested-airports {
            display: flex;
            gap: 6px;
        }

        .airport-suggestion {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--accent-amber-dim);
            border-radius: 2px;
            color: var(--accent-amber);
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .airport-suggestion:hover {
            background: var(--accent-amber);
            color: #000;
        }

        /* ── CONTROLS BAR ── */
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            padding: 10px 16px;
            background: var(--bg-flap);
            border-radius: 4px;
            flex-wrap: wrap;
        }

        .controls label {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .controls input, .controls select {
            font-family: 'Roboto Mono', monospace;
            padding: 6px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid #333;
            background: #111;
            color: var(--text-bright);
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color-scheme: dark;
        }

        .controls input:-webkit-autofill,
        .controls input:-webkit-autofill:hover,
        .controls input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 30px #111 inset !important;
            -webkit-text-fill-color: var(--text-bright) !important;
            border: 1px solid #333;
        }

        .controls input:focus, .controls select:focus {
            outline: none;
            border-color: var(--accent-amber);
        }

        .controls select option {
            background: #111;
            color: var(--text-bright);
        }

        .controls input::placeholder {
            color: #555;
            text-transform: uppercase;
        }

        .btn {
            font-family: 'Roboto Condensed', sans-serif;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 700;
            border: none;
            background: var(--accent-amber);
            color: #000;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--text-bright);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Toggle switch */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .toggle-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'Roboto Condensed', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 18px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #333;
            border-radius: 9px;
            transition: 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background: #888;
            border-radius: 50%;
            transition: 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-amber-dim);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(18px);
            background: var(--accent-amber);
        }

        /* ── SPLIT-FLAP BOARD ── */
        .board-container {
            background: #0d0d0d;
            border-radius: 6px;
            padding: 0;
            overflow: hidden;
            border: 2px solid #1a1a1a;
            box-shadow:
                0 4px 24px rgba(0,0,0,0.8),
                inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .board-header {
            display: grid;
            grid-template-columns: 0.9fr 0.7fr 2fr 0.8fr 0.5fr 0.9fr;
            gap: 3px;
            padding: 8px 6px 6px;
            background: #0a0a0a;
            border-bottom: 2px solid var(--accent-amber-dim);
        }

        .board-header div {
            text-align: center;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-amber);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 4px 0;
        }

        #flightBoard {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #333 #111;
        }

        #flightBoard::-webkit-scrollbar {
            width: 6px;
        }

        #flightBoard::-webkit-scrollbar-track {
            background: #111;
        }

        #flightBoard::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* ── SPLIT-FLAP ROW ── */
        .flight-row {
            display: grid;
            grid-template-columns: 0.9fr 0.7fr 2fr 0.8fr 0.5fr 0.9fr;
            gap: 3px;
            padding: 2px 6px;
            background: #0d0d0d;
            border-bottom: 1px solid #151515;
            animation: rowAppear 0.3s ease-out backwards;
        }

        @keyframes rowAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .flight-row.in-air-row {
            background: #0d1205;
        }

        .flight-row.in-air-row .flap-cell {
            border-color: #1a2a10;
        }

        /* ── INDIVIDUAL FLAP CELL ── */
        .flap-cell {
            background: var(--bg-flap);
            border: 1px solid #252525;
            border-radius: 2px;
            padding: 6px 8px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            /* The signature split-flap horizontal line */
            background-image: linear-gradient(
                to bottom,
                var(--bg-flap) 0%,
                var(--bg-flap) 48%,
                var(--split-line) 48%,
                var(--split-line) 52%,
                var(--bg-flap-light) 52%,
                var(--bg-flap-light) 100%
            );
            /* Subtle top/bottom shadow like physical flaps */
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.04),
                inset 0 -1px 0 rgba(0,0,0,0.3);
        }

        .flap-cell.airline-cell {
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: var(--text-white);
            gap: 6px;
            justify-content: flex-start;
            text-align: left;
            padding-left: 6px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .airline-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
            background: white;
            border-radius: 2px;
            padding: 2px;
            flex-shrink: 0;
        }

        .flap-cell.flight-num-cell {
            color: var(--accent-amber);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .flap-cell.route-cell {
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            justify-content: center;
            text-align: center;
            padding-left: 8px;
            padding-right: 8px;
        }

        .flap-cell.route-cell .route-arrow {
            color: var(--accent-amber-dim);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .flap-cell.route-cell .route-code {
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .flap-cell.time-cell {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .flap-cell.gate-cell {
            font-size: 0.85rem;
            color: var(--text-white);
        }

        /* ── STATUS FLAP ── */
        .flap-cell.status-cell {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .flap-cell.status-cell.status-scheduled {
            color: var(--status-blue);
        }

        .flap-cell.status-cell.status-boarding {
            color: var(--status-yellow);
            animation: flapBlink 2s ease-in-out infinite;
        }

        .flap-cell.status-cell.status-in-air {
            color: var(--status-green);
        }

        .flap-cell.status-cell.status-landed {
            color: var(--status-green);
        }

        .flap-cell.status-cell.status-delayed {
            color: var(--status-orange);
        }

        .flap-cell.status-cell.status-cancelled {
            color: var(--status-red);
        }

        @keyframes flapBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── LOADING / EMPTY STATES ── */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #222;
            border-top-color: var(--accent-amber);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 30px;
            background: rgba(196, 60, 60, 0.08);
            border: 1px solid #3a1a1a;
            border-radius: 4px;
            color: var(--status-red);
            font-size: 0.85rem;
            margin: 10px;
        }

        .error a {
            color: var(--accent-amber);
        }

        .no-flights {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .demo-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent-amber-dim);
            color: #000;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .refresh-info {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .toggle-group {
                margin-left: 0;
            }

            .board-header, .flight-row {
                grid-template-columns: 1fr;
                gap: 2px;
            }

            .board-header {
                display: none;
            }

            .flap-cell::before {
                content: attr(data-label);
                font-weight: 700;
                color: var(--accent-amber);
                margin-right: 8px;
                font-size: 0.65rem;
                min-width: 70px;
                text-align: left;
            }

            .flap-cell {
                justify-content: flex-start;
            }

            .flap-cell.airline-cell {
                justify-content: flex-start;
            }
        }
    </style>
</head>

        // ─── GEOLOCATION ───
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 3959;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                     Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                     Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function detectLocationAndSuggestAirports() {
            if ('geolocation' in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLon = position.coords.longitude;
                        const airportsWithDistance = majorAirports.map(a => ({
                            ...a, distance: calculateDistance(userLat, userLon, a.lat, a.lon)
                        }));
                        airportsWithDistance.sort((a, b) => a.distance - b.distance);
                        const nearest = airportsWithDistance.slice(0, 3);

                        document.getElementById('locationInfo').textContent =
                            `📍 ${userLat.toFixed(1)}°, ${userLon.toFixed(1)}°`;

                        document.getElementById('suggestedAirports').innerHTML = nearest.map(a =>
                            `<div class="airport-suggestion" onclick="selectAirport('${a.code}')">${a.code} (${Math.round(a.distance)}mi)</div>`
                        ).join('');
                    },
                    () => showDefaultSuggestions()
                );
            } else {
                showDefaultSuggestions();
            }
        }

        function showDefaultSuggestions() {
            document.getElementById('suggestedAirports').innerHTML = `
                <div class="airport-suggestion" onclick="selectAirport('CHS')">CHS</div>
                <div class="airport-suggestion" onclick="selectAirport('ATL')">ATL</div>
                <div class="airport-suggestion" onclick="selectAirport('CLT')">CLT</div>
            `;
        }

        function selectAirport(code) {
            document.getElementById('airportCode').value = code;
            loadFlights();
        }

        // ─── API FETCH ───
        async function fetchFlightData(airportCode, flightType) {
            if (flightType === 'all') {
                const departures = await fetchFlightsByType(airportCode, 'departures');
                const arrivals = await fetchFlightsByType(airportCode, 'arrivals');
                return [...departures, ...arrivals];
            }
            return await fetchFlightsByType(airportCode, flightType);
        }

        async function fetchFlightsByType(airportCode, type) {
            const baseUrl = 'http://api.aviationstack.com/v1/flights';
            const params = new URLSearchParams({
                access_key: AVIATIONSTACK_API_KEY,
                limit: type === 'all' ? 50 : 100
            });

            if (type === 'departures') {
                params.append('dep_iata', airportCode.toUpperCase());
            } else {
                params.append('arr_iata', airportCode.toUpperCase());
            }

            const apiUrl = `${baseUrl}?${params.toString()}`;
            apiCallCount++;

            for (let i = 0; i < CORS_PROXIES.length; i++) {
                const proxyIndex = (currentProxyIndex + i) % CORS_PROXIES.length;
                const proxy = CORS_PROXIES[proxyIndex];
                const url = `${proxy}${encodeURIComponent(apiUrl)}`;

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const data = JSON.parse(await response.text());
                    if (data.error) throw new Error(data.error.info || data.error.message || JSON.stringify(data.error));

                    currentProxyIndex = proxyIndex;
                    return processAviationStackData(data, airportCode, type);
                } catch (e) {
                    console.error(`Proxy ${proxyIndex + 1} failed:`, e.message);
                    if (i === CORS_PROXIES.length - 1) throw e;
                }
            }
            return [];
        }

        function processAviationStackData(data, airportCode, flightType) {
            if (!data.data || data.data.length === 0) return [];

            const flights = [];
            const code = airportCode.toUpperCase();

            data.data.forEach(flight => {
                const airlineIata = flight.airline?.iata || 'XX';
                const flightNumber = flight.flight?.number || '0000';
                const departureTime = flight.departure?.scheduled || flight.departure?.estimated;
                const arrivalTime = flight.arrival?.scheduled || flight.arrival?.estimated;

                let displayTime = flightType === 'arrivals' ? arrivalTime : departureTime;
                if (!displayTime) return;

                const timeObj = new Date(displayTime);
                const hours = timeObj.getHours().toString().padStart(2, '0');
                const minutes = timeObj.getMinutes().toString().padStart(2, '0');

                // Determine flight status
                const apiStatus = (flight.flight_status || '').toLowerCase();
                let status = 'Scheduled';
                let statusClass = 'scheduled';
                let isInAir = false;
                let isLanded = false;
                let isDeparted = false;

                if (apiStatus === 'active' || apiStatus === 'en-route') {
                    isInAir = true;
                    status = 'In Air';
                    statusClass = 'in-air';
                } else if (apiStatus === 'landed') {
                    isLanded = true;
                    status = 'Landed';
                    statusClass = 'landed';
                } else if (apiStatus === 'cancelled') {
                    status = 'Cancelled';
                    statusClass = 'cancelled';
                } else if (apiStatus === 'incident' || apiStatus === 'diverted') {
                    status = apiStatus === 'diverted' ? 'Diverted' : 'Delayed';
                    statusClass = 'delayed';
                }

                // Check for delays
                if (flight.departure?.delay > 0 || flight.arrival?.delay > 0) {
                    if (!isInAir && !isLanded) {
                        status = 'Delayed';
                        statusClass = 'delayed';
                    }
                }

                // If the flight has departed the selected airport but hasn't landed yet
                const depIata = flight.departure?.iata || '';
                const arrIata = flight.arrival?.iata || '';

                // For departures view: if flight left this airport and is in air
                if (flightType === 'departures' && depIata === code) {
                    if (apiStatus === 'landed') {
                        // Departed from our airport and landed at destination
                        isDeparted = true;
                        isLanded = true;
                        status = 'Landed';
                        statusClass = 'landed';
                    }
                }

                const origin = depIata || 'N/A';
                const destination = arrIata || 'N/A';
                const route = `${origin} → ${destination}`;

                flights.push({
                    airline: airlineIata,
                    flightNumber: flight.flight?.iata || `${airlineIata}${flightNumber}`,
                    flightNumOnly: flightNumber,
                    route: route,
                    time: `${hours}:${minutes}`,
                    gate: flight.departure?.gate || flight.arrival?.gate || '—',
                    status,
                    statusClass,
                    isInAir,
                    isLanded,
                    isDeparted,
                    sortTime: timeObj.getTime(),
                    depIata,
                    arrIata
                });
            });

            return flights;
        }

        // ─── FLIGHT FILTERING ───
        function filterFlights(flights) {
            const showInAir = document.getElementById('showInAir').checked;
            const airportCode = document.getElementById('airportCode').value.trim().toUpperCase();
            const flightType = document.getElementById('flightType').value;

            return flights.filter(f => {
                // Always hide flights that have fully departed and arrived
                // For departures: if it left our airport and landed at destination → hide
                // Unless it JUST landed (show "Landed" for one cycle)
                if (f.isLanded && f.depIata === airportCode && flightType !== 'arrivals') {
                    // Check if this flight was previously shown as "In Air"
                    // If so, show it as "Landed" this cycle, then it gets removed next refresh
                    const prevFlight = previousFlightData.find(
                        pf => pf.flightNumber === f.flightNumber && pf.isInAir
                    );
                    if (prevFlight) {
                        f.status = 'Landed';
                        f.statusClass = 'landed';
                        f.showAsLanded = true;
                        return true; // Show one more cycle as "Landed"
                    }
                    return false; // Already cleared
                }

                // For arrivals: if flight has arrived at our airport → hide
                if (f.isLanded && f.arrIata === airportCode && flightType === 'arrivals') {
                    return false;
                }

                // In-air flights: only show if toggle is ON
                if (f.isInAir && !showInAir) {
                    return false;
                }

                // Hide departed flights (not in air, just departed status)
                if (f.statusClass === 'departed') {
                    return false;
                }

                return true;
            });
        }

        // ─── ROUTE HEADER UPDATE ───
        function updateRouteHeader() {
            const flightType = document.getElementById('flightType').value;
            const header = document.getElementById('routeHeader');
            if (flightType === 'departures') header.textContent = 'Departing To';
            else if (flightType === 'arrivals') header.textContent = 'Arriving From';
            else header.textContent = 'Route';
        }

        // Update header and re-render when dropdown changes (no API call)
        document.getElementById('flightType').addEventListener('change', () => {
            updateRouteHeader();
            if (!isShowingDemo && previousFlightData.length > 0) {
                const filtered = filterFlights(previousFlightData);
                filtered.sort((a, b) => {
                    if (a.statusClass === 'boarding' && b.statusClass !== 'boarding') return -1;
                    if (a.statusClass !== 'boarding' && b.statusClass === 'boarding') return 1;
                    if (a.isInAir && !b.isInAir) return -1;
                    if (!a.isInAir && b.isInAir) return 1;
                    return a.sortTime - b.sortTime;
                });
                renderFlights(filtered, false);
            }
        });

        // ─── FORMAT ROUTE DISPLAY ───
        function formatRoute(flight) {
            const flightType = document.getElementById('flightType').value;
            const depCity = getCityName(flight.depIata || '');
            const arrCity = getCityName(flight.arrIata || '');
            const depCode = flight.depIata || '';
            const arrCode = flight.arrIata || '';

            if (flightType === 'departures') {
                // "Departing To" — show destination city with code
                return `${arrCity} <span class="route-code">(${arrCode})</span>`;
            } else if (flightType === 'arrivals') {
                // "Arriving From" — show origin city with code
                return `${depCity} <span class="route-code">(${depCode})</span>`;
            } else {
                // "All" — city names only, no codes
                return `${depCity}<span class="route-arrow">→</span>${arrCity}`;
            }
        }

        // ─── RENDER ───
        function renderFlights(flights, isDemo = false) {
            const board = document.getElementById('flightBoard');
            updateRouteHeader();

            if (flights.length === 0) {
                board.innerHTML = '<div class="no-flights">NO FLIGHTS TO DISPLAY</div>';
                return;
            }

            board.innerHTML = flights.map((flight, index) => {
                const name = airlineNames[flight.airline] || flight.airline;
                const logoUrl = `https://images.kiwi.com/airlines/64/${flight.airline}.png`;
                const rowClass = flight.isInAir ? 'in-air-row' : '';
                const routeHTML = formatRoute(flight);

                return `
                <div class="flight-row ${rowClass}" style="animation-delay: ${index * 0.03}s">
                    <div class="flap-cell airline-cell" data-label="Airline">
                        <img src="${logoUrl}" alt="${flight.airline}" class="airline-logo"
                             onerror="this.style.display='none'">${name}
                    </div>
                    <div class="flap-cell flight-num-cell" data-label="Flight">${flight.flightNumOnly}</div>
                    <div class="flap-cell route-cell" data-label="Route">${routeHTML}</div>
                    <div class="flap-cell time-cell" data-label="Time">${flight.time}</div>
                    <div class="flap-cell gate-cell" data-label="Gate">${flight.gate}</div>
                    <div class="flap-cell status-cell status-${flight.statusClass}" data-label="Status">${flight.status}</div>
                </div>`;
            }).join('');

            if (isDemo) {
                board.insertAdjacentHTML('beforeend',
                    `<div style="text-align:center; padding:12px; color:#555; font-size:0.7rem; letter-spacing:2px;">
                        SAMPLE DATA — ENTER AN AIRPORT CODE FOR LIVE FLIGHTS
                    </div>`
                );
            }
        }

        // ─── LOAD FLIGHTS ───
        async function loadFlights() {
            const airportCode = document.getElementById('airportCode').value.trim();
            const flightType = document.getElementById('flightType').value;
            const board = document.getElementById('flightBoard');

            if (!airportCode) {
                board.innerHTML = '<div class="error">Enter an airport IATA code</div>';
                return;
            }
            if (airportCode.length < 3) {
                board.innerHTML = '<div class="error">Airport code must be at least 3 characters</div>';
                return;
            }
            if (AVIATIONSTACK_API_KEY === 'YOUR_API_KEY_HERE') {
                board.innerHTML = `<div class="error">
                    <strong>API Key Required</strong><br><br>
                    Sign up free at <a href="https://aviationstack.com/product" target="_blank">aviationstack.com</a><br>
                    Then replace YOUR_API_KEY_HERE in the code.
                </div>`;
                return;
            }

            isShowingDemo = false;
            board.innerHTML = `<div class="loading"><div class="spinner"></div><div>Loading ${airportCode.toUpperCase()}...</div></div>`;

            try {
                const flights = await fetchFlightData(airportCode, flightType);
                const filtered = filterFlights(flights);

                // Sort: boarding first, then by time
                filtered.sort((a, b) => {
                    if (a.statusClass === 'boarding' && b.statusClass !== 'boarding') return -1;
                    if (a.statusClass !== 'boarding' && b.statusClass === 'boarding') return 1;
                    if (a.isInAir && !b.isInAir) return -1;
                    if (!a.isInAir && b.isInAir) return 1;
                    return a.sortTime - b.sortTime;
                });

                // Store for next cycle's "landed" detection
                previousFlightData = flights;
                lastRefreshTime = new Date();
                updateRefreshInfo();

                renderFlights(filtered, false);
            } catch (error) {
                console.error('Error loading flights:', error);
                board.innerHTML = `<div class="error">
                    <strong>Failed to load flight data</strong><br><br>
                    ${error.message}<br><br>
                    Common issues: invalid API key, invalid airport code, rate limit exceeded, or CORS proxy unavailable.
                </div>`;
            }
        }

        // ─── AUTO-REFRESH ───
        function setupAutoRefresh() {
            const toggle = document.getElementById('autoRefreshToggle');
            toggle.addEventListener('change', () => {
                if (toggle.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
                updateRefreshInfo();
            });
        }

        function startAutoRefresh() {
            stopAutoRefresh();
            autoRefreshTimer = setInterval(() => {
                const airportCode = document.getElementById('airportCode').value.trim();
                if (airportCode && airportCode.length >= 3 && !isShowingDemo) {
                    loadFlights();
                }
            }, REFRESH_INTERVAL_MS);
        }

        function stopAutoRefresh() {
            if (autoRefreshTimer) {
                clearInterval(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        function updateRefreshInfo() {
            const el = document.getElementById('refreshInfo');
            const toggle = document.getElementById('autoRefreshToggle');
            if (toggle.checked) {
                el.textContent = '(30 min)';
            } else {
                el.textContent = '';
            }
        }


        // ─── SHOW IN-AIR TOGGLE ───
        document.getElementById('showInAir').addEventListener('change', () => {
            // Re-filter and re-render if we have live data
            if (!isShowingDemo && previousFlightData.length > 0) {
                const filtered = filterFlights(previousFlightData);
                filtered.sort((a, b) => {
                    if (a.statusClass === 'boarding' && b.statusClass !== 'boarding') return -1;
                    if (a.statusClass !== 'boarding' && b.statusClass === 'boarding') return 1;
                    if (a.isInAir && !b.isInAir) return -1;
                    if (!a.isInAir && b.isInAir) return 1;
                    return a.sortTime - b.sortTime;
                });
                renderFlights(filtered, false);
            }
        });

        // ─── CLOCK ───
        function updateClock() {
            const now = new Date();
            document.getElementById('digitalClock').textContent =
                now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0') + ':' +
                now.getSeconds().toString().padStart(2, '0');

            if (!document.getElementById('timezoneInfo').textContent) {
                const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                const abbr = now.toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ')[2];
                document.getElementById('timezoneInfo').textContent = `${tz} (${abbr})`;
            }
        }

        // ─── ENTER KEY ───
        document.getElementById('airportCode').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadFlights();
        });

        // ─── INIT ───
        updateClock();
        setInterval(updateClock, 1000);
        detectLocationAndSuggestAirports();
        setupAutoRefresh();

        // Show demo data on initial load
        renderFlights(getDemoFlights(), true);
    </script>
